<!DOCTYPE html>
<html>
<head>
    <title>My Account</title>
    <link rel="stylesheet" href="account.css">
</head>
<body>

<div class="center-box">

    <h1>My Account</h1>

    <p><strong>Name:</strong> <span id="name">Loading...</span></p>

    <p><strong>Email:</strong> <span id="email">Loading...</span></p>

    <p><strong>User ID:</strong> <span id="userid">Loading...</span></p>

    <p><strong>Balance:</strong> <span id="balance">$0</span></p>

    <button onclick="location.href='portal.html'">Back</button>

</div>

<script src="https://cdn.auth0.com/js/auth0-spa-js/2.18/auth0-spa-js.production.js"></script>

<script>

(async () => {

    try {

        const client = await auth0.createAuth0Client({
            domain: "bankingsimulator.ca.auth0.com",
            clientId: "aPg9tnBgnEsj6wQhJeftU2F859Gyz90w",
            authorizationParams: {
                redirect_uri: window.location.origin + "/login-signup.html"
            }
        });

        const isLoggedIn = await client.isAuthenticated();

        if (!isLoggedIn) {

            document.getElementById("name").innerText = "Not Logged In";
            document.getElementById("email").innerText = "Not Logged In";
            document.getElementById("userid").innerText = "Not Logged In";

            return;
        }

        const user = await client.getUser();

        document.getElementById("name").innerText =
            user.name || "No Name";

        document.getElementById("email").innerText =
            user.email || "No Email";

        document.getElementById("userid").innerText =
            user.sub || "No ID";

        let balance = localStorage.getItem("balance");

        if (balance === null) {
            balance = 5000;
        }

        document.getElementById("balance").innerText =
            "$" + balance;

    } catch (error) {

        console.error(error);

        document.getElementById("name").innerText = "Error";
        document.getElementById("email").innerText = error.message;
        document.getElementById("userid").innerText = "Check Console";

    }

})();

</script>

</body>
</html>
