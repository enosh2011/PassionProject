<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bank Portal</title>

<link rel="stylesheet" href="portal.css">
</head>

<body>

<div class="dashboard">

<div class="sidebar">

<h1 class="logo">BANKING SIMULATOR</h1>

<ul>
<li class="active">Dashboard</li>
<li onclick="location.href='account.html'">Account</li>
<li onclick="location.href='transactions.html'">Transactions</li>
<li onclick="location.href='settings.html'">Settings</li>
</ul>

<button class="logout-btn" onclick="logout()">Log Out</button>

</div>

<div class="main-content">

  <div class="top">
      <h2>Dashboard</h2>
  </div>

  <div class="balance-card">
      <div>
          <p>Total Balance</p>
          <h1 id="balance">$5000</h1>
      </div>
  </div>

<div class="actions">

  <div class="card big-card">
      <h3>Deposit</h3>
      <p>Add money to your account instantly.</p>
          <button onclick="location.href='deposit.html'">Deposit</button>
      </div>

      <div class="card big-card">
          <h3>Withdraw</h3>
          <p>Withdraw funds from your account.</p>
          <button onclick="location.href='withdraw.html'">Withdraw</button>
      </div>

  </div>

  <div class="transactions">

      <h2>Recent Activity</h2>

      <div id="transactionList">

          <div class="transaction">

            <div>
              <h4>Amazon</h4>
              <p>Today</p>
            </div>
              <span class="expense">-$24.99</span>
          </div>

          <div class="transaction">
            <div>
              <h4>Paycheck</h4>
              <p>2 days ago</p>
            </div>
              <span class="income">+$1,200.00</span>
          </div>
      </div>

  </div>

</div>

<script>

let balance = localStorage.getItem("balance");
if(balance === null){
balance = 5000;
} else {
balance = Number(balance);
}

document.getElementById("balance").innerText = "$" + balance;

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

let list = document.getElementById("transactionList");

transactions.reverse().forEach(t => {

let div = document.createElement("div");
div.classList.add("transaction");

div.innerHTML = `
<div>
<h4>${t.type}</h4>
<p>${t.time}</p>
</div>
<span class="${t.color}">
${t.amount}
</span>
`;

list.appendChild(div);

});

</script>


<script src="https://cdn.auth0.com/js/auth0-spa-js/2.18/auth0-spa-js.production.js"></script>

<script>
function logout() {
  window.location.href =
    "https://bankingsimulator.ca.auth0.com/v2/logout?client_id=aPg9tnBgnEsj6wQhJeftU2F859Gyz90w&returnTo=" +
    encodeURIComponent("https://enosh2011.github.io/PassionProject/");
}
</script>
</body>
</html>
